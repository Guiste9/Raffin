type Property @entity(immutable: false) {
  id: ID!
  address: String!
  name: String!
  symbol: String!
  owner: String!
  totalShares: BigInt!
  pricePerShare: BigInt!
  propertyAddress: String!
  propertyImageIPFS: String!
  propertyDescription: String!
  saleActive: Boolean!
  createdAt: BigInt!
}

type SharePurchase @entity(immutable: true) {
  id: ID!
  property: Property!
  buyer: String!
  amount: BigInt!
  totalPaid: BigInt!
  createdAt: BigInt!
}