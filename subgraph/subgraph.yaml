specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: PropertyToken
    network: sepolia
    source:
      address: "0xCB71915479db29136E6eA6bc92D385Ee3CFFA2C0"
      abi: PropertyToken
      startBlock: 7800000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Property
        - SharePurchase
      abis:
        - name: PropertyToken
          file: ./abis/PropertyToken.json
      eventHandlers:
        - event: SharesPurchased(indexed address,uint256,uint256)
          handler: handleSharesPurchased
        - event: SaleStatusChanged(bool)
          handler: handleSaleStatusChanged
      file: ./src/property-token.ts