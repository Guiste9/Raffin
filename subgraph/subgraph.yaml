specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: PropertyToken
    network: sepolia
    source:
      address: "0xCB71915479db29136E6eA6bc92D385Ee3CFFA2C0"
      abi: PropertyToken
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Approval
        - OwnershipTransferred
        - PropertyMetadataUpdated
        - SaleStatusChanged
        - SharesPurchased
        - Transfer
      abis:
        - name: PropertyToken
          file: ./abis/PropertyToken.json
      eventHandlers:
        - event: Approval(indexed address,indexed address,uint256)
          handler: handleApproval
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: PropertyMetadataUpdated(string)
          handler: handlePropertyMetadataUpdated
        - event: SaleStatusChanged(bool)
          handler: handleSaleStatusChanged
        - event: SharesPurchased(indexed address,uint256,uint256)
          handler: handleSharesPurchased
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
      file: ./src/property-token.ts
